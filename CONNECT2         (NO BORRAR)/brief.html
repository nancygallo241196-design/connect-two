<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Brief de Marca  | Connect2</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  background:linear-gradient(135deg,#000,#1a1a1a);
  color:white;
  padding:60px 20px;
  display:flex;
  justify-content:center;
}

.brief-container{
  width:100%;
  max-width:900px;
}

h1{
  margin-bottom:40px;
  font-size:32px;
  background:linear-gradient(90deg,#ff7a18,#ff3c00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ACCORDION */
.section{
  background:rgba(255,255,255,0.05);
  margin-bottom:15px;
  border-radius:15px;
  overflow:hidden;
}

.section-header{
  padding:18px 20px;
  cursor:pointer;
  font-weight:500;
  background:rgba(255,255,255,0.03);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.section-content{
  padding:20px;
  display:none;
}

.section.active .section-content{
  display:block;
}

/* INPUTS */
.input-group{
  margin-bottom:18px;
}

.input-group label{
  font-size:13px;
  opacity:.8;
  display:block;
  margin-bottom:6px;
}

input, textarea, select{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:rgba(255,255,255,0.08);
  color:white;
}

textarea{resize:none;height:80px;}

/* BOTONES MULTIPLE */
.options{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.option-btn{
  padding:8px 14px;
  border-radius:20px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  cursor:pointer;
  font-size:13px;
  transition:.3s;
}

.option-btn.active{
  background:linear-gradient(135deg,#ff7a18,#ff3c00);
  border:none;
}

/* BOTÓN FINAL */
.submit-btn{
  margin-top:30px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ff7a18,#ff3c00);
  color:white;
  font-size:16px;
  cursor:pointer;
}

</style>
</head>
<body>

<div class="brief-container">
<h1>BRIEF DE MARCA</h1>

<form id="briefForm">

<!-- 1 INFORMACIÓN GENERAL -->
<div class="section">
<div class="section-header">1. Información General</div>
<div class="section-content">

<div class="input-group">
<label>Nombre del proyecto</label>
<input type="text" id="nombreProyecto">
</div>

<div class="input-group">
<label>Marca nueva o rediseño</label>
<select>
<option>Nueva</option>
<option>Rediseño</option>
</select>
</div>

<div class="input-group">
<label>Persona de contacto</label>
<input type="text">
</div>

<div class="input-group">
<label>Correo</label>
<input type="email">
</div>

</div>
</div>

<!-- 2 NEGOCIO -->
<div class="section">
<div class="section-header">2. Información del Negocio</div>
<div class="section-content">

<div class="input-group">
<label>¿Qué hace la empresa?</label>
<textarea></textarea>
</div>

<div class="input-group">
<label>Propuesta de valor</label>
<textarea></textarea>
</div>

</div>
</div>

<!-- 3 PERSONALIDAD -->
<div class="section">
<div class="section-header">3. Personalidad de Marca</div>
<div class="section-content">

<div class="options">
<button type="button" class="option-btn">Elegante</button>
<button type="button" class="option-btn">Minimalista</button>
<button type="button" class="option-btn">Moderna</button>
<button type="button" class="option-btn">Clásica</button>
<button type="button" class="option-btn">Juvenil</button>
<button type="button" class="option-btn">Corporativa</button>
<button type="button" class="option-btn">Cercana</button>
<button type="button" class="option-btn">Divertida</button>
<button type="button" class="option-btn">Premium</button>
<button type="button" class="option-btn">Rebelde</button>
<button type="button" class="option-btn">Creativa</button>
</div>

</div>
</div>

<!-- 4 IDENTIDAD VISUAL -->
<div class="section">
<div class="section-header">4. Identidad Visual</div>
<div class="section-content">

<div class="input-group">
<label>Colores preferidos</label>
<input type="text">
</div>

<div class="input-group">
<label>Colores que NO quiere</label>
<input type="text">
</div>

<div class="options">
<button type="button" class="option-btn">Serif</button>
<button type="button" class="option-btn">Sans Serif</button>
<button type="button" class="option-btn">Script</button>
<button type="button" class="option-btn">Display</button>
</div>

</div>
</div>

<!-- 5 APLICACIONES -->
<div class="section">
<div class="section-header">5. Aplicaciones necesarias</div>
<div class="section-content">

<div class="options">
<button type="button" class="option-btn">Logo principal</button>
<button type="button" class="option-btn">Manual de marca</button>
<button type="button" class="option-btn">Redes sociales</button>
<button type="button" class="option-btn">Papelería</button>
<button type="button" class="option-btn">Empaque</button>
<button type="button" class="option-btn">Página web</button>
<button type="button" class="option-btn">Subenirs</button>
<button type="button" class="option-btn">Marquecinas</button>
<button type="button" class="option-btn">Productos relacionados</button>
</div>

</div>
</div>

<button type="submit" class="submit-btn">Finalizar Brief</button>

</form>
</div>

<script>

/* ACCORDION */
document.querySelectorAll(".section-header").forEach(header=>{
  header.addEventListener("click",()=>{
    header.parentElement.classList.toggle("active");
  });
});

/* BOTONES MULTIPLE */
document.querySelectorAll(".option-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    btn.classList.toggle("active");
  });
});

</script>

</body>
</html>
