<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selecciona tu Brief | Connect2</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  background:linear-gradient(135deg,#000,#111);
  color:white;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.container{
  text-align:center;
  max-width:1000px;
  width:100%;
}

h1{
  margin-bottom:50px;
  font-size:32px;
  background:linear-gradient(90deg,#ff7a18,#ff3c00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,122,24,0.2);
  padding:30px;
  border-radius:20px;
  cursor:pointer;
  transition:.3s;
  text-decoration:none;
  color:white;
}

.card:hover{
  transform:translateY(-8px);
  background:linear-gradient(135deg,#ff7a18,#ff3c00);
}

.card h2{
  margin-bottom:10px;
}

.card p{
  font-size:14px;
  opacity:.8;
}
</style>
</head>
<body>

<div class="container">
<h1>Selecciona el tipo de Brief</h1>

<div class="grid">

<a href="brief-branding.html" class="card">
<h2>Branding</h2>
<p>Identidad visual, personalidad, valores, posicionamiento.</p>
</a>

<a href="brief-web.html" class="card">
<h2>Diseño Web</h2>
<p>Objetivos digitales, estructura, experiencia de usuario.</p>
</a>

<a href="brief-social.html" class="card">
<h2>Redes Sociales</h2>
<p>Estrategia de contenido, tono, público y estilo visual.</p>
</a>

</div>
</div>

</body>
</html>
