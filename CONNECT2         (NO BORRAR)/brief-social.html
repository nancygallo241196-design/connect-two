<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief Redes Sociales | Connect2</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  background:linear-gradient(135deg,#000,#111);
  color:white;
  padding:60px 20px;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:950px;
}

h1{
  margin-bottom:40px;
  font-size:34px;
  background:linear-gradient(90deg,#ff7a18,#ff3c00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* SECCIONES */
.section{
  background:rgba(255,255,255,0.05);
  border-radius:16px;
  margin-bottom:20px;
  border:1px solid rgba(255,122,24,0.2);
  overflow:hidden;
}

.section-header{
  padding:18px 22px;
  cursor:pointer;
  font-weight:500;
  background:rgba(255,255,255,0.03);
}

.section-content{
  padding:25px;
  display:none;
}

.section.active .section-content{
  display:block;
}

/* INPUTS */
.input-group{margin-bottom:18px;}
.input-group label{
  font-size:13px;
  opacity:.8;
  display:block;
  margin-bottom:6px;
}

input,textarea{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:white;
}

textarea{resize:none;height:90px;}

/* BOTONES MULTIPLE */
.options{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.option-btn{
  padding:10px 16px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  font-size:13px;
  transition:.3s;
}

.option-btn:hover{
  border-color:#ff7a18;
}

.option-btn.active{
  background:linear-gradient(135deg,#ff7a18,#ff3c00);
  border:none;
}

/* BOTÓN FINAL */
.submit-btn{
  margin-top:30px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ff7a18,#ff3c00);
  font-size:16px;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<h1>Brief Estrategia de Redes Sociales</h1>

<form id="briefSocialForm">

<!-- 1 INFO GENERAL -->
<div class="section active">
<div class="section-header">1. Información General</div>
<div class="section-content">

<div class="input-group">
<label>Nombre de la marca</label>
<input type="text">
</div>

<div class="input-group">
<label>Giro del negocio</label>
<input type="text">
</div>

<div class="input-group">
<label>Redes actuales</label>
<div class="options">
<button type="button" class="option-btn">Instagram</button>
<button type="button" class="option-btn">Facebook</button>
<button type="button" class="option-btn">TikTok</button>
<button type="button" class="option-btn">LinkedIn</button>
<button type="button" class="option-btn">YouTube</button>
</div>
</div>

</div>
</div>

<!-- 2 OBJETIVOS -->
<div class="section">
<div class="section-header">2. Objetivo en Redes</div>
<div class="section-content">

<div class="options">
<button type="button" class="option-btn">Generar ventas</button>
<button type="button" class="option-btn">Generar comunidad</button>
<button type="button" class="option-btn">Reconocimiento</button>
<button type="button" class="option-btn">Educación</button>
<button type="button" class="option-btn">Lanzamiento</button>
<button type="button" class="option-btn">Atención al cliente</button>
</div>

<div class="input-group">
<label>¿Cómo sabremos que funciona?</label>
<textarea></textarea>
</div>

</div>
</div>

<!-- 3 CONTENIDO -->
<div class="section">
<div class="section-header">3. Tipo de Contenido</div>
<div class="section-content">

<div class="options">
<button type="button" class="option-btn">Informativo</button>
<button type="button" class="option-btn">Educativo</button>
<button type="button" class="option-btn">Entretenimiento</button>
<button type="button" class="option-btn">Inspiracional</button>
<button type="button" class="option-btn">Promocional</button>
<button type="button" class="option-btn">Testimonios</button>
</div>

<div class="input-group">
<label>Formatos</label>
<div class="options">
<button type="button" class="option-btn">Reels</button>
<button type="button" class="option-btn">Historias</button>
<button type="button" class="option-btn">Carruseles</button>
<button type="button" class="option-btn">Posts</button>
<button type="button" class="option-btn">Lives</button>
</div>
</div>

</div>
</div>

<!-- 4 TONO -->
<div class="section">
<div class="section-header">4. Personalidad y Tono</div>
<div class="section-content">

<div class="options">
<button type="button" class="option-btn">Formal</button>
<button type="button" class="option-btn">Cercana</button>
<button type="button" class="option-btn">Divertida</button>
<button type="button" class="option-btn">Inspiradora</button>
<button type="button" class="option-btn">Elegante</button>
<button type="button" class="option-btn">Juvenil</button>
</div>

<div class="input-group">
<label>Si la marca fuera persona, ¿cómo hablaría?</label>
<textarea></textarea>
</div>

</div>
</div>

<!-- 5 PUBLICIDAD -->
<div class="section">
<div class="section-header">5. Publicidad y Métricas</div>
<div class="section-content">

<div class="options">
<button type="button" class="option-btn">Tráfico</button>
<button type="button" class="option-btn">Conversión</button>
<button type="button" class="option-btn">Alcance</button>
<button type="button" class="option-btn">Interacción</button>
<button type="button" class="option-btn">Leads</button>
</div>

<div class="input-group">
<label>Presupuesto mensual estimado</label>
<input type="text">
</div>

</div>
</div>

<button type="submit" class="submit-btn">Finalizar Brief Social</button>

</form>
</div>

<script>
/* ACCORDION */
document.querySelectorAll(".section-header").forEach(header=>{
  header.addEventListener("click",()=>{
    header.parentElement.classList.toggle("active");
  });
});

/* BOTONES MULTIPLE */
document.querySelectorAll(".option-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    btn.classList.toggle("active");
  });
});
</script>

</body>
</html>
