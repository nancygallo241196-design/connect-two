<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | Connect2</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0b0b0b,#111);
  color:white;
}

/* CONTENEDOR */
.auth-container{
  width:400px;
  background:#141414;
  padding:40px 35px;
  border-radius:20px;
  position:relative;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* LOGO */
.logo{
  text-align:center;
  font-size:22px;
  font-weight:700;
  margin-bottom:30px;
  background:linear-gradient(90deg,#ff7a18,#ff3c00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:space-between;
  margin-bottom:25px;
}

.tab-btn{
  flex:1;
  padding:10px;
  background:none;
  border:none;
  color:#aaa;
  cursor:pointer;
  font-size:15px;
}

.tab-btn.active{
  color:white;
  border-bottom:2px solid #ff7a18;
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  gap:15px;
}

input, select{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1c1c1c;
  color:white;
}

.primary-btn{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(135deg,#ff7a18,#ff3c00);
  color:white;
  cursor:pointer;
  font-size:14px;
}

.hidden{
  display:none;
}

.back{
  position:absolute;
  top:15px;
  left:20px;
  color:#aaa;
  font-size:13px;
  cursor:pointer;
}

.back:hover{
  color:#ff7a18;
}
</style>
</head>
<body>

<div class="auth-container">

  <div class="back" onclick="window.location.href='index.html'">← Volver</div>

  <div class="logo">CONNECT TWO </div>
  

  <div class="tabs">
    <button class="tab-btn active" onclick="showLogin()">Iniciar sesión</button>
    <button class="tab-btn" onclick="showRegister()">Registrarse</button>
  </div>

  <!-- LOGIN -->
  <form id="loginForm">
    <input type="email" placeholder="Correo" required>
    <input type="password" placeholder="Contraseña" required>
    <button type="button" class="primary-btn" onclick="login()">Entrar</button>
  </form>

  <!-- REGISTER -->
  <form id="registerForm" class="hidden">
    <input type="text" placeholder="Nombre completo" required>
    <input type="email" placeholder="Correo" required>
    <input type="password" placeholder="Contraseña" required>

    <select id="rol">
      <option value="cliente">Cliente</option>
      <option value="disenador">Diseñador</option>
    </select>

    <button type="button" class="primary-btn" onclick="register()">Crear cuenta</button>
  </form>

</div>

<script>
function showLogin(){
  document.getElementById("loginForm").classList.remove("hidden");
  document.getElementById("registerForm").classList.add("hidden");
  document.querySelectorAll(".tab-btn")[0].classList.add("active");
  document.querySelectorAll(".tab-btn")[1].classList.remove("active");
}

function showRegister(){
  document.getElementById("registerForm").classList.remove("hidden");
  document.getElementById("loginForm").classList.add("hidden");
  document.querySelectorAll(".tab-btn")[1].classList.add("active");
  document.querySelectorAll(".tab-btn")[0].classList.remove("active");
}

function login(){
  // Simulación
  window.location.href="dashboard-cliente.html";
}

function register(){
  const rol = document.getElementById("rol").value;

  if(rol === "cliente"){
    window.location.href="dashboard-cliente.html";
  } else {
    window.location.href="dashboard-disenador.html";
  }
}
</script>

</body>
</html>
