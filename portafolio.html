<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Diseñadores | Connect2</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  background:#0b0b0b;
  color:white;
  padding:40px;
}

h1{
  font-size:32px;
  margin-bottom:30px;
  background:linear-gradient(90deg,#ff7a18,#ff3c00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* FILTROS */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-bottom:40px;
}

.filter-btn{
  padding:10px 18px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  cursor:pointer;
  font-size:14px;
  transition:.3s;
  color:white;
}

.filter-btn:hover{
  border-color:#ff7a18;
}

.filter-btn.active{
  background:linear-gradient(135deg,#ff7a18,#ff3c00);
  border:none;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
}

/* CARD */
.card{
  position:relative;
  height:300px;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.4s;
}

.card:hover{
  transform:translateY(-6px);
}

/* FONDO */
.card-bg{
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
}

/* OVERLAY OSCURO */
.card::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.3));
  top:0;
  left:0;
}

/* FOTO PERFIL */
.profile-circle{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90px;
  height:90px;
  border-radius:50%;
  border:4px solid white;
  background-size:cover;
  background-position:center;
  z-index:2;
}

/* INFO */
.card-info{
  position:absolute;
  bottom:18px;
  left:20px;
  z-index:3;
}

.card-info h3{
  font-size:18px;
  font-weight:700;
  color:white;
}

.card-info p{
  font-size:13px;
  color:white;
  opacity:0.85;
  margin-top:4px;
}

/* BOTÓN */
.view-btn{
  position:absolute;
  top:15px;
  right:15px;
  padding:6px 14px;
  font-size:12px;
  border-radius:20px;
  border:none;
  background:linear-gradient(135deg,#ff7a18,#ff3c00);
  cursor:pointer;
  z-index:3;
  color:white;
}
</style>
</head>
<body>
<nav class="navbar">
    <div class="logo">
      <img src="img/CONNECTTWO LOGO.png" alt="logo" width="200">
    </div>
  </nav>

<h1>- Explorar Diseñadores</h1> 

<div class="filters">
  <button class="filter-btn active">Todos</button>
  <button class="filter-btn">Fotografía</button>
  <button class="filter-btn">Web</button>
  <button class="filter-btn">Video</button>
  <button class="filter-btn">Edición</button>
  <button class="filter-btn">Editorial</button>
  <button class="filter-btn">Ilustración</button>
  <button class="filter-btn">Publicidad</button>
  <button class="filter-btn">Marketing</button>
  <button class="filter-btn">Branding</button>
  <button class="filter-btn">Packaging</button>
  <button class="filter-btn">Identidad</button>
</div>



<div class="grid">
  <!-- GENERADOR DE CARDS -->
<script>
const grid = document.querySelector(".grid");

const designers = [
  {name:"Nancy Gallo", location:"Ciudad Obregón, MX"},
  {name:"Carlos Rivera", location:"Guadalajara, MX"},
  {name:"María Torres", location:"CDMX, MX"},
  {name:"Luis Mendoza", location:"Monterrey, MX"},
  {name:"Ana López", location:"Puebla, MX"},
  {name:"Diego Ramírez", location:"Tijuana, MX"},
  {name:"Sofía Martínez", location:"Querétaro, MX"},
  {name:"Ricardo Vega", location:"León, MX"},
  {name:"Daniela Cruz", location:"Mérida, MX"},
  {name:"Javier Salas", location:"Chihuahua, MX"},
  {name:"Fernanda Ruiz", location:"Toluca, MX"},
  {name:"Miguel Ortega", location:"Cancún, MX"},
  {name:"Camila Navarro", location:"Hermosillo, MX"},
  {name:"Andrés Castillo", location:"Aguascalientes, MX"},
  {name:"Valeria Soto", location:"Culiacán, MX"},
  {name:"Eduardo Pineda", location:"Morelia, MX"}
];

designers.forEach((d,i)=>{
  grid.innerHTML += `
  <div class="card">
    <div class="card-bg" style="background-image:url('https://picsum.photos/400/400?random=${i}')"></div>
    <div class="profile-circle" style="background-image:url('https://randomuser.me/api/portraits/${i%2==0?'women':'men'}/${40+i}.jpg')"></div>
    <button class="view-btn" onclick="window.location.href='perfil.html'">Ver perfil</button>
    <div class="card-info">
      <h3>${d.name}</h3>
      <p>${d.location}</p>
    </div>
  </div>
  `;
});
</script>

</div>

<script>
document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
  });
});
</script>

</body>
</html>
